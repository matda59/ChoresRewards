<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Settings - ChoresAwards</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ── Layout ── */
        .settings-layout {
            display: flex;
            max-width: 1100px;
            margin: 2rem auto;
            background: linear-gradient(135deg, #141f33 0%, #1a2840 100%);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            color: #fff;
        }
        .settings-nav {
            width: 220px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px 0 0 16px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            border-right: 1px solid rgba(255,255,255,0.07);
        }
        .settings-nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.97rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.7em;
            padding: 0.7em 1em;
            border-radius: 10px;
            transition: background 0.2s, color 0.2s;
        }
        .settings-nav a.active, .settings-nav a:hover {
            background: rgba(76,175,80,0.18);
            color: #4CAF50;
        }
        .settings-nav a.active { background: rgba(76,175,80,0.25); font-weight: 700; }
        .settings-content {
            flex: 1;
            padding: 2rem 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .section-title {
            font-size: 1.1rem; font-weight: 700; margin-bottom: 0.9rem;
            color: #fff; display: flex; align-items: center; gap: 0.5em;
        }
        .section-title > i { color: #4CAF50; }
        .settings-section {
            background: linear-gradient(135deg, #1a2436 0%, #1e2d42 100%);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 14px;
            padding: 1.5rem;
            box-shadow: 0 2px 14px rgba(0,0,0,0.2);
            color: #fff;
        }
        .save-btn {
            padding: 0.55rem 1.2rem; border-radius: 8px; border: none;
            cursor: pointer; font-size: 0.9rem; font-weight: 700;
            background: #4CAF50; color: #fff;
            box-shadow: 0 2px 8px rgba(76,175,80,0.3);
            transition: all 0.2s;
        }
        .save-btn:hover { background: #45a049; box-shadow: 0 3px 14px rgba(76,175,80,0.45); }
        /* Audio list styles */
        #audio-sounds-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 1rem;
        }
        .sound-item {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            color: #fff;
            transition: background 0.15s;
        }
        .sound-item:hover { background: rgba(255,255,255,0.04); }
        .sound-name {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
            font-size: 0.95rem;
        }
        .sound-controls button {
            background: none;
            border: none;
            color: #4CAF50;
            cursor: pointer;
            font-size: 1.15em;
            padding: 4px 7px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
        }
        .sound-controls button:hover { color: #81c784; background: rgba(76,175,80,0.12); }
        .sound-controls button:disabled { color: #555; cursor: default; background: none; }
        .custom-file-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5em;
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            padding: 0.55em 1.1em;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s, border-color 0.2s;
        }
        .custom-file-label:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
        @media (max-width: 900px) {
            .settings-layout { flex-direction: column; }
            .settings-nav { width: 100%; border-radius: 16px 16px 0 0; flex-direction: row; flex-wrap: wrap; gap: 0.4rem; padding: 1rem; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.07); }
            .settings-content { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body data-theme="dark">
    <header>
        <div class="header-content" style="display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#141f33 0%,#1a2840 100%);padding:0.75rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.07);">
            <h2 style="color: white;">Chores and Rewards - Settings</h2>
        </div>
        <nav class="settings-topnav">
            <a href="{{ url_for('routes.index') }}" class="topnav-link">Home</a>
            <a href="{{ url_for('routes.activity_log') }}" class="topnav-link">Activity Log</a>
        </nav>
        <style>
        .settings-topnav {
            margin: 0 0 28px 0;
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding-bottom: 16px;
        }
        .topnav-link {
            color: #fff;
            padding: 8px 16px;
            text-decoration: none;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
            border-radius: 4px;
            position: relative;
        }
        .topnav-link:hover {
            color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }
        </style>
    </header>
    <main>
        <div class="settings-layout">
            <nav class="settings-nav">
                <a href="{{ url_for('routes.settings') }}"{% if request.endpoint == 'routes.settings' %} class="active"{% endif %}><i class="fas fa-cog"></i> General Settings</a>
                <a href="{{ url_for('routes.settings_audio') }}"{% if request.endpoint == 'routes.settings_audio' %} class="active"{% endif %}><i class="fas fa-volume-up"></i> Audio Settings</a>
                <a href="{{ url_for('routes.settings_notification') }}"{% if request.endpoint == 'routes.settings_notification' %} class="active"{% endif %}><i class="fas fa-bell"></i> Notification Settings</a>
            </nav>
            <div class="settings-content">
                <h3 class="section-title"><i class="fas fa-volume-up"></i> Audio Settings</h3>
                <section class="settings-section">
                    <p style="color:rgba(255,255,255,0.65);margin-top:0;">When a chore is completed, a random sound effect from this list will play. Upload MP3, WAV, or OGG files to add new sounds.</p>
                    <form id="upload-sound-form" enctype="multipart/form-data" style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-bottom:0.5rem;">
                        <label for="sound-file-input" class="custom-file-label">
                            <i class="fas fa-upload"></i>Choose File
                        </label>
                        <input type="file" id="sound-file-input" name="sound_file" accept=".mp3,.wav,.ogg" required style="display:none;">
                        <span id="file-selected-name" style="color:#81c784;font-size:0.9rem;"></span>
                        <button type="submit" class="save-btn"><i class="fas fa-upload" style="margin-right:6px;"></i>Upload Sound</button>
                    </form>
                    <script>
                    // Show selected file name
                    document.addEventListener('DOMContentLoaded', function() {
                        const fileInput = document.getElementById('sound-file-input');
                        const fileNameSpan = document.getElementById('file-selected-name');
                        fileInput.addEventListener('change', function() {
                            fileNameSpan.textContent = fileInput.files.length ? fileInput.files[0].name : '';
                        });
                    });
                    </script>
                </form>
                <div id="audio-sounds-list" style="margin-bottom: 1rem;"></div>
                <script>
            document.addEventListener('DOMContentLoaded', function() {
                const audioListContainer = document.getElementById('audio-sounds-list');
                const uploadForm = document.getElementById('upload-sound-form');
                const soundFileInput = document.getElementById('sound-file-input');
                let currentAudio = null;
                let currentPlayBtn = null;

                // Fetch and display sounds
                function loadSounds() {
                    fetch('/api/sounds')
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                renderSounds(data.sounds);
                            } else {
                                audioListContainer.innerHTML = `<p>Error loading sounds: ${data.error}</p>`;
                            }
                        })
                        .catch(err => {
                            audioListContainer.innerHTML = `<p>Error loading sounds: ${err.message}</p>`;
                        });
                }

                // Render sounds list
                function renderSounds(sounds) {
                    audioListContainer.innerHTML = '';
                    if (sounds.length === 0) {
                        audioListContainer.innerHTML = '<p>No sounds found.</p>';
                        return;
                    }
                    sounds.forEach(sound => {
                        const soundItem = document.createElement('div');
                        soundItem.className = 'sound-item';

                        const soundName = document.createElement('div');
                        soundName.className = 'sound-name';
                        soundName.textContent = sound;

                        const controls = document.createElement('div');
                        controls.className = 'sound-controls';

                        // Play/Stop button
                        const playBtn = document.createElement('button');
                        playBtn.classList.add('play-btn');
                        playBtn.innerHTML = '<i class="fas fa-play"></i>';
                        playBtn.title = 'Play';
                        playBtn.addEventListener('click', () => {
                            if (currentAudio && !currentAudio.paused) {
                                currentAudio.pause();
                                currentAudio.currentTime = 0;
                                if (currentPlayBtn) {
                                    currentPlayBtn.innerHTML = '<i class="fas fa-play"></i>';
                                    currentPlayBtn.title = 'Play';
                                }
                                if (currentAudio.src.endsWith(sound)) {
                                    // Clicking the same play button stops the audio
                                    currentAudio = null;
                                    currentPlayBtn = null;
                                    return;
                                }
                            }
                            if (currentAudio) {
                                currentAudio.pause();
                                currentAudio.currentTime = 0;
                                if (currentPlayBtn) {
                                    currentPlayBtn.innerHTML = '<i class="fas fa-play"></i>';
                                    currentPlayBtn.title = 'Play';
                                }
                            }
                            currentAudio = new Audio(`/static/sounds/${sound}`);
                            currentAudio.play();
                            playBtn.innerHTML = '<i class="fas fa-stop"></i>';
                            playBtn.title = 'Stop';
                            currentPlayBtn = playBtn;
                            currentAudio.onended = () => {
                                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                                playBtn.title = 'Play';
                                currentAudio = null;
                                currentPlayBtn = null;
                            };
                        });

                        // Download button
                        const downloadBtn = document.createElement('button');
                        downloadBtn.innerHTML = '<i class="fas fa-download" style="color: white;"></i>';
                        downloadBtn.title = 'Download';
                        downloadBtn.addEventListener('click', () => {
                            const link = document.createElement('a');
                            link.href = `/static/sounds/${sound}`;
                            link.download = sound;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                        });

                        // Delete button
                        const deleteBtn = document.createElement('button');
                        deleteBtn.innerHTML = '<i class="fas fa-trash-alt" style="color: red;"></i>';
                        deleteBtn.title = 'Delete';
                        deleteBtn.addEventListener('click', () => {
                            if (confirm(`Are you sure you want to delete "${sound}"?`)) {
                                fetch('/api/sounds/delete', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ filename: sound })
                                })
                                .then(response => response.json())
                                .then(data => {
                                    if (data.success) {
                                        if (currentAudio && !currentAudio.paused && currentAudio.src.includes(sound)) {
                                            currentAudio.pause();
                                            currentAudio = null;
                                        }
                                        loadSounds();
                                    } else {
                                        alert('Failed to delete sound: ' + data.error);
                                    }
                                })
                                .catch(err => alert('Error deleting sound: ' + err.message));
                            }
                        });

                        controls.appendChild(playBtn);
                        controls.appendChild(downloadBtn);
                        controls.appendChild(deleteBtn);

                        soundItem.appendChild(soundName);
                        soundItem.appendChild(controls);

                        audioListContainer.appendChild(soundItem);
                    });
                }

                // Handle upload form submission
                uploadForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const file = soundFileInput.files[0];
                    if (!file) {
                        alert('Please select a sound file to upload.');
                        return;
                    }
                    const formData = new FormData();
                    formData.append('sound_file', file);
                    fetch('/api/sounds/upload', {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            soundFileInput.value = '';
                            loadSounds();
                        } else {
                            alert('Upload failed: ' + data.error);
                        }
                    })
                    .catch(err => alert('Upload error: ' + err.message));
                });

                // Initial load of sounds
                loadSounds();

                // Add periodic refresh every 30 seconds to update sounds list automatically
                setInterval(() => {
                    loadSounds();
                }, 30000);
            });
            </script>
        </div>
    </main>
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
</body>
</html>
